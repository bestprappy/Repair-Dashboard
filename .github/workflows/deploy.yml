name: CI and Vercel deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Lint and verify build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Verify production build
        env:
          # A CI-only value. The real secret lives in the Vercel project env.
          AUTH_PASSWORD: ci-build-placeholder-not-for-production
          NEXT_PUBLIC_SHEET_URL: https://docs.google.com/spreadsheets/d/15wZ9K1wSrdNbe0vos0u53bpVCl12rhy6LEVfxekdS-k/edit?usp=sharing
        run: npm run build

  deploy:
    name: Deploy to Vercel (production)
    # Deploy only from main pushes and manual runs, never from PRs.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-production
    # Requires these repo secrets (Settings → Secrets and variables → Actions):
    #   VERCEL_TOKEN      — create at vercel.com/account/settings/tokens
    #   VERCEL_ORG_ID     — Vercel project Settings → General, or .vercel/project.json after `vercel link`
    #   VERCEL_PROJECT_ID — same place as VERCEL_ORG_ID
    # The Vercel project's Root Directory must be set to `web`; runtime env vars
    # (AUTH_PASSWORD, NEXT_PUBLIC_SHEET_URL) are pulled from the Vercel project.
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel project settings and env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
